name: snowfluff
description: "For you who walk in snow."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  audio_service: ^0.18.18
  audio_session: ^0.2.3
  cached_network_image: ^3.4.1
  file_picker: ^11.0.2
  flutter:
    sdk: flutter
  flutter_displaymode: ^0.7.0
  flutter_riverpod: ^3.3.1
  flutter_screenutil: ^5.9.3
  go_router: ^17.2.1
  hive_ce: ^2.19.3
  hive_ce_flutter: ^2.3.4
  just_audio: ^0.10.5
  just_audio_media_kit: ^2.1.0
  media_kit_libs_linux: any
  ncm_api:
    path: ../ncm-api-dart
  path_provider: ^2.1.5
  riverpod_annotation: ^4.0.2
  scrollable_positioned_list: ^0.3.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.13.1
  riverpod_generator: ^4.0.3
  hive_ce_generator: ^1.11.0

flutter:
  uses-material-design: true
  # assets:
  #   - assets/
  fonts:
  - family: AppCJK
    fonts:
    - asset: assets/fonts/NotoSansSC-Regular.ttf